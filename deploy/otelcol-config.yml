# Splunk Gateway OTel Collector Config
# Receives OTLP from all Astronomy Shop services and exports to Splunk O11y Cloud.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  http_forwarder:
    ingress:
      endpoint: 0.0.0.0:6060
    egress:
      endpoint: "https://api.${SPLUNK_REALM}.signalfx.com"
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Valkey (Redis-compatible) metrics for cart service visibility
  redis:
    endpoint: "valkey-cart:6379"
    collection_interval: 10s

  # Scrape collector's own operational metrics so health check can verify it's alive
  prometheus/internal:
    config:
      scrape_configs:
        - job_name: otelcol
          scrape_interval: 15s
          static_configs:
            - targets: ["0.0.0.0:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 2s
    limit_mib: 200

  # Stamp every span/metric/log with deployment.environment = $SPLUNK_ENVIRONMENT
  # This scopes all telemetry to the environment the agent will query.
  resource/add_environment:
    attributes:
      - action: upsert
        value: "${SPLUNK_ENVIRONMENT}"
        key: deployment.environment
      - action: upsert
        value: "${SPLUNK_ENVIRONMENT}"
        key: sf_environment

  resourcedetection:
    detectors: [env, system]
    timeout: 10s
    override: true

  # Promote key resource attributes → span attributes so they appear in
  # Splunk's span tag store and APM metric dimensions (spans.count, etc.).
  transform/promote_env_to_span:
    trace_statements:
      - context: span
        statements:
          - set(attributes["deployment.environment"], resource.attributes["deployment.environment"])
          - set(attributes["host.name"], resource.attributes["host.name"])
          - set(attributes["host.id"], resource.attributes["host.id"])

exporters:
  # Traces → Splunk APM
  otlphttp/traces:
    traces_endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_INGEST_TOKEN}"

  # Metrics → Splunk Infrastructure Monitoring
  signalfx:
    access_token: "${SPLUNK_INGEST_TOKEN}"
    realm: "${SPLUNK_REALM}"
    sync_host_metadata: false
    send_otlp_histograms: true   # required for latency histogram charts
    timeout: 30s
    idle_conn_timeout: 60s       # force reconnect before Docker NAT drops the connection
    http2_read_idle_timeout: 30s # send pings on idle to detect dead connections early
    http2_ping_timeout: 10s      # fail fast if ping goes unanswered

  # AlwaysOn Profiling → Splunk APM profiling backend (HEC format, NOT OTLP)
  # The Splunk ingest /v1/log endpoint speaks HEC, not OTLP — use splunk_hec exporter.
  # No Splunk Cloud/Enterprise required; the profiling feature is in Observability Cloud APM.
  splunk_hec/profiling:
    token: "${SPLUNK_INGEST_TOKEN}"
    endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v1/log"
    log_data_enabled: false        # don't forward general log data
    profiling_data_enabled: true   # only forward profiling records

  # Secondary fan-out → O11y Agent streaming receiver
  # Queued so agent latency never blocks the primary Splunk export path.
  otlphttp/agent:
    endpoint: "http://o11y-agent:4318"
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 120s

service:
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

  extensions: [health_check, http_forwarder, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment, transform/promote_env_to_span]
      exporters: [otlphttp/traces, signalfx, otlphttp/agent]

    metrics:
      receivers: [otlp, redis]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment]
      exporters: [signalfx]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment]
      exporters: [splunk_hec/profiling, otlphttp/agent]

    metrics/internal:
      receivers: [prometheus/internal]
      processors: [memory_limiter, batch]
      exporters: [signalfx]
