# Splunk Gateway OTel Collector Config
# Receives OTLP from all Astronomy Shop services and exports to Splunk O11y Cloud.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  http_forwarder:
    ingress:
      endpoint: 0.0.0.0:6060
    egress:
      endpoint: "https://api.${SPLUNK_REALM}.signalfx.com"
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Valkey (Redis-compatible) metrics for cart service visibility
  redis:
    endpoint: "valkey-cart:6379"
    collection_interval: 10s

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 2s
    limit_mib: 200

  # Stamp every span/metric/log with deployment.environment = $SPLUNK_ENVIRONMENT
  # This scopes all telemetry to the environment the agent will query.
  resource/add_environment:
    attributes:
      - action: upsert
        value: "${SPLUNK_ENVIRONMENT}"
        key: deployment.environment
      - action: upsert
        value: "${SPLUNK_ENVIRONMENT}"
        key: sf_environment

  resourcedetection:
    detectors: [env, system]
    timeout: 10s
    override: false

exporters:
  # Traces → Splunk APM
  otlphttp/traces:
    traces_endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"

  # Metrics → Splunk Infrastructure Monitoring
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    realm: "${SPLUNK_REALM}"
    sync_host_metadata: false
    send_otlp_histograms: true   # required for latency histogram charts

  # Logs → Splunk Platform (HEC)
  splunk_hec/logs:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}/services/collector"
    source: "otel"
    sourcetype: "otel"
    index: "astronomyshop"
    profiling_data_enabled: false
    tls:
      insecure_skip_verify: false

  # Secondary fan-out → O11y Agent streaming receiver
  # Queued so agent latency never blocks the primary Splunk export path.
  otlphttp/agent:
    endpoint: "http://o11y-agent:4318"
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 120s

service:
  extensions: [health_check, http_forwarder, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment]
      exporters: [otlphttp/traces, signalfx, otlphttp/agent]

    metrics:
      receivers: [otlp, redis]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment]
      exporters: [signalfx]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/add_environment]
      exporters: [splunk_hec/logs, otlphttp/agent]
