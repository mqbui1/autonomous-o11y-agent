# OpenTelemetry Demo (Astronomy Shop) Helm values
# Routes all telemetry through the Splunk OTel Collector gateway.

# Disable the built-in Jaeger/Prometheus/Grafana/OpenSearch — we use Splunk instead
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Configure the built-in OTel Collector to export to the Splunk gateway
opentelemetry-collector:
  config:
    exporters:
      otlp/splunk:
        endpoint: "splunk-otel-collector-gateway.monitoring.svc.cluster.local:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          exporters: [debug, otlp/splunk]
        metrics:
          exporters: [debug, otlp/splunk]
        logs:
          exporters: [debug, otlp/splunk]

# Set deployment.environment on all services so Splunk scopes them correctly
default:
  env:
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "deployment.environment=astronomy-shop-demo"
