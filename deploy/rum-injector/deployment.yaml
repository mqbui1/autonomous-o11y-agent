apiVersion: apps/v1
kind: Deployment
metadata:
  name: rum-injector
  namespace: astronomy-shop
  labels:
    app: rum-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rum-injector
  template:
    metadata:
      labels:
        app: rum-injector
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: rum-injector-config
---
apiVersion: v1
kind: Service
metadata:
  name: rum-injector
  namespace: astronomy-shop
spec:
  selector:
    app: rum-injector
  ports:
    - port: 8081
      targetPort: 8081
