# Autonomous O11y Agent + Splunk Gateway Collector + OpenTelemetry Astronomy Shop
#
# Usage:
#   cp .env.example .env         # fill in your Splunk credentials
#   docker compose up -d         # start everything
#   docker compose logs -f o11y-agent   # watch agent assessments
#
# The Astronomy Shop generates realistic e-commerce telemetry (traces, metrics, logs).
# The Splunk gateway collector receives all OTLP data and forwards to Splunk O11y Cloud.
# The Autonomous O11y Agent runs every 30 minutes, assessing the environment in Splunk.

x-default-logging: &logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"
    tag: "{{.Name}}"

networks:
  default:
    name: opentelemetry-demo
    driver: bridge

services:

  # ============================================================
  # SPLUNK GATEWAY OTEL COLLECTOR
  # Receives all telemetry from Astronomy Shop services and
  # forwards traces/metrics/logs to Splunk Observability Cloud.
  # ============================================================
  otel-collector:
    image: quay.io/signalfx/splunk-otel-collector:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/otelcol-config.yml"]
    user: "0:0"
    volumes:
      - ./otelcol-config.yml:/etc/otel/otelcol-config.yml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "13133:13133"  # health_check
    environment:
      - SPLUNK_ACCESS_TOKEN
      - SPLUNK_INGEST_TOKEN
      - SPLUNK_REALM
      - SPLUNK_ENVIRONMENT
      - GOMEMLIMIT=200MiB
    logging: *logging

  # ============================================================
  # AUTONOMOUS O11Y AGENT
  # Streaming mode: OTLP receiver on :4318 accepts a secondary
  # fan-out from the gateway collector for real-time detection
  # (PII, attribute gaps, cardinality spikes, new services).
  # Batch mode: runs a full 9-specialist assessment every WATCH_INTERVAL minutes.
  # ============================================================
  o11y-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: o11y-agent
    restart: unless-stopped
    ports:
      - "4319:4318"    # OTLP receiver (4319 on host to avoid conflict with collector)
    environment:
      - SPLUNK_ACCESS_TOKEN
      - SPLUNK_REALM
      - SPLUNK_ENVIRONMENT
      # AWS credentials — read from ~/.aws/credentials mounted below.
      # Run deploy/refresh-aws-creds.sh on the host to refresh without restarting.
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
      # LLM provider — set LLM_PROVIDER in .env to "bedrock", "ollama", or "openai"
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      # Bedrock (LLM_PROVIDER=bedrock)
      - BEDROCK_MODEL_ID
      # Ollama (LLM_PROVIDER=ollama)
      - OLLAMA_MODEL
      - OLLAMA_BASE_URL
      # OpenAI-compatible (LLM_PROVIDER=openai)
      - OPENAI_BASE_URL
      - OPENAI_API_KEY
      - OPENAI_MODEL
      # Agent behaviour
      - WATCH_INTERVAL=${WATCH_INTERVAL:-30}
      - AUTO_APPLY=${AUTO_APPLY:-false}
      - CAPTURE_TRAINING_DATA=${CAPTURE_TRAINING_DATA:-false}
      - TOOL_TIMEOUT=${TOOL_TIMEOUT:-180}
      # Streaming receiver (collector fans out here)
      - OTLP_RECEIVER_PORT=4318
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_SUPPRESS=${ALERT_SUPPRESS:-}
    volumes:
      - agent-state:/root/.o11y-agent
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ../../auto-detector-provisioner:/opt/auto-detector-provisioner:ro
      - ../../o11y-instrumentation-analyzer:/opt/o11y-instrumentation-analyzer:ro
      - ../../o11y-usage-governance:/opt/o11y-usage-governance:ro
      - ../../splunk-o11y-health-check:/opt/splunk-o11y-health-check:ro
      # Live code reload — changes on host take effect without image rebuild
      - ../agents:/opt/agent/agents:ro
      - ../tools:/opt/agent/tools:ro
      - ../providers:/opt/agent/providers:ro
      - ../receiver:/opt/agent/receiver:ro
      - ../config.py:/opt/agent/config.py:ro
      - ../state.py:/opt/agent/state.py:ro
      - ../main.py:/opt/agent/main.py:ro
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  # ============================================================
  # ASTRONOMY SHOP — CORE SERVICES
  # All services send OTLP telemetry to the Splunk gateway above.
  # ============================================================

  accounting:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-accounting
    container_name: accounting
    restart: unless-stopped
    environment:
      - KAFKA_ADDR=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=accounting
    depends_on:
      otel-collector:
        condition: service_started
      kafka:
        condition: service_started
    logging: *logging

  ad:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-ad
    container_name: ad
    restart: unless-stopped
    ports:
      - "9555"
    environment:
      - AD_PORT=9555
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=ad
    depends_on:
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  cart:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-cart
    container_name: cart
    restart: unless-stopped
    ports:
      - "7070"
    environment:
      - CART_PORT=7070
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - VALKEY_ADDR=valkey-cart:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=cart
      - ASPNETCORE_URLS=http://*:7070
    depends_on:
      otel-collector:
        condition: service_started
      valkey-cart:
        condition: service_started
    logging: *logging

  checkout:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-checkout
    container_name: checkout
    restart: unless-stopped
    ports:
      - "5050"
    environment:
      - CHECKOUT_PORT=5050
      - CART_ADDR=cart:7070
      - CURRENCY_ADDR=currency:7001
      - EMAIL_ADDR=http://email:6060
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - PAYMENT_ADDR=payment:50051
      - PRODUCT_CATALOG_ADDR=product-catalog:3550
      - SHIPPING_ADDR=shipping:50050
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=checkout
      # AlwaysOn Profiling — Go, requires github.com/signalfx/splunk-otel-go/instrumentation/github.com/gorilla/mux/splunkmux
      - SPLUNK_PROFILER_ENABLED=true
    depends_on:
      otel-collector:
        condition: service_started
      cart:
        condition: service_started
      currency:
        condition: service_started
      email:
        condition: service_started
      payment:
        condition: service_started
      product-catalog:
        condition: service_started
      shipping:
        condition: service_started
    logging: *logging

  currency:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-currency
    container_name: currency
    restart: unless-stopped
    ports:
      - "7001"
    environment:
      - CURRENCY_PORT=7001
      - VERSION=${DEMO_VERSION:-latest}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT},service.name=currency
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  email:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-email
    container_name: email
    restart: unless-stopped
    ports:
      - "6060"
    environment:
      - APP_ENV=production
      - EMAIL_PORT=6060
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-collector:4318/v1/traces
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=email
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  fraud-detection:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-fraud-detection
    container_name: fraud-detection
    restart: unless-stopped
    environment:
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - KAFKA_ADDR=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=fraud-detection
      - OTEL_LOGS_EXPORTER=otlp
    depends_on:
      otel-collector:
        condition: service_started
      kafka:
        condition: service_started
    logging: *logging

  frontend:
    build:
      context: .
      dockerfile: profiling/Dockerfile.frontend
    image: astroshop-frontend-splunk
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      - PORT=8080
      - FRONTEND_ADDR=frontend:8080
      - AD_ADDR=ad:9555
      - CART_ADDR=cart:7070
      - CHECKOUT_ADDR=checkout:5050
      - CURRENCY_ADDR=currency:7001
      - PRODUCT_CATALOG_ADDR=product-catalog:3550
      - RECOMMENDATION_ADDR=recommendation:9001
      - SHIPPING_ADDR=shipping:50050
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=frontend
      - PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://localhost:8080/otlp-http/v1/traces
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - WEB_OTEL_SERVICE_NAME=frontend-web
      - OTEL_COLLECTOR_HOST=otel-collector
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - ENV_PLATFORM=local
      # AlwaysOn Profiling — requires Splunk OTel Node.js distro (@splunk/otel).
      # Standard OTel demo image ignores these; swap IMAGE_NAME to a Splunk-instrumented
      # build to activate. Vars are pre-set here so profiling works immediately on upgrade.
      - SPLUNK_PROFILER_ENABLED=true
      - SPLUNK_PROFILER_CALL_STACK_INTERVAL=10000
    depends_on:
      otel-collector:
        condition: service_started
      ad:
        condition: service_started
      cart:
        condition: service_started
      checkout:
        condition: service_started
      currency:
        condition: service_started
      product-catalog:
        condition: service_started
      recommendation:
        condition: service_started
      shipping:
        condition: service_started
      image-provider:
        condition: service_started
    logging: *logging

  frontend-proxy:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-frontend-proxy
    container_name: frontend-proxy
    restart: unless-stopped
    ports:
      - "10000:10000"  # Envoy admin (8080 moved to rum-proxy for RUM injection)
    environment:
      - FRONTEND_PORT=8080
      - FRONTEND_HOST=frontend
      - LOCUST_WEB_HOST=load-generator
      - LOCUST_WEB_PORT=8089
      - GRAFANA_PORT=3000
      - GRAFANA_HOST=grafana
      - JAEGER_PORT=16686
      - JAEGER_HOST=jaeger
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_COLLECTOR_PORT_HTTP=4318
      - IMAGE_PROVIDER_HOST=image-provider
      - IMAGE_PROVIDER_PORT=8081
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=frontend-proxy
      - ENVOY_PORT=8080
      - ENVOY_ADDR=0.0.0.0
      - ENVOY_ADMIN_PORT=10000
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - FLAGD_UI_HOST=flagd
      - FLAGD_UI_PORT=4000
      - JAEGER_UI_PORT=16686
      - OTEL_SERVICE_NAMESPACE=opentelemetry-demo
      # Stub ports for optional services not deployed
      - CHATBOT_HOST=localhost
      - CHATBOT_PORT=8080
      - FIREPIT_HOST=localhost
      - FIREPIT_PORT=8080
      - TELEMETRY_DOCS_HOST=localhost
      - TELEMETRY_DOCS_PORT=8080
    depends_on:
      frontend:
        condition: service_started
      load-generator:
        condition: service_started
      grafana:
        condition: service_started
      jaeger:
        condition: service_started
    dns_search: ""
    logging: *logging

  # ============================================================
  # RUM INJECTOR
  # Nginx proxy that sits in front of frontend-proxy and injects
  # the Splunk RUM JavaScript snippet into every HTML response.
  # Requires SPLUNK_RUM_TOKEN in .env (create a RUM-type token in
  # Splunk O11y Cloud → Settings → Access Tokens).
  # Open http://localhost:8080 as before — nothing else changes.
  # ============================================================
  rum-proxy:
    build:
      context: ./rum-injector
      dockerfile: Dockerfile
    container_name: rum-proxy
    restart: unless-stopped
    ports:
      - "8080:80"      # Main demo UI — open http://localhost:8080
    environment:
      - SPLUNK_REALM
      - SPLUNK_ENVIRONMENT
      - SPLUNK_RUM_TOKEN
    depends_on:
      - frontend-proxy
    logging: *logging

  image-provider:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-image-provider
    container_name: image-provider
    restart: unless-stopped
    ports:
      - "8081"
    environment:
      - IMAGE_PROVIDER_PORT=8081
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_SERVICE_NAME=image-provider
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  load-generator:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-load-generator
    container_name: load-generator
    restart: unless-stopped
    ports:
      - "8089:8089"    # Locust UI — open http://localhost:8089
    environment:
      - LOCUST_WEB_PORT=8089
      - LOCUST_USERS=${LOCUST_USERS:-5}
      - LOCUST_HOST=http://frontend-proxy:8080
      - LOCUST_HEADLESS=false
      - LOCUST_AUTOSTART=true
      - LOCUST_BROWSER_TRAFFIC_ENABLED=false
      - LOCUST_WEB_HOST=0.0.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=load-generator
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
    depends_on:
      frontend:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  payment:
    build:
      context: .
      dockerfile: profiling/Dockerfile.payment
    image: astroshop-payment-splunk
    container_name: payment
    restart: unless-stopped
    ports:
      - "50051"
    environment:
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - PAYMENT_PORT=50051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=payment
      # AlwaysOn Profiling — Node.js, requires @splunk/otel
      - SPLUNK_PROFILER_ENABLED=true
      - SPLUNK_PROFILER_CALL_STACK_INTERVAL=10000
    depends_on:
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  product-catalog:
    # Pinned to 1.12.0: 2.0.x+ requires an external ./products directory not bundled in the image.
    # 1.12.0 embeds product data and works standalone. Use PRODUCT_CATALOG_SERVICE_PORT (not PORT).
    image: ghcr.io/open-telemetry/demo:1.12.0-productcatalogservice
    container_name: product-catalog
    restart: unless-stopped
    ports:
      - "3550"
    environment:
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - PRODUCT_CATALOG_SERVICE_PORT=3550
      - PRODUCT_CATALOG_RELOAD_INTERVAL=10
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=product-catalog
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  quote:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-quote
    container_name: quote
    restart: unless-stopped
    ports:
      - "8090"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - QUOTE_PORT=8090
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=quote
      - OTEL_PHP_INTERNAL_METRICS_ENABLED=true
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  recommendation:
    build:
      context: .
      dockerfile: profiling/Dockerfile.recommendation
    image: astroshop-recommendation-splunk
    container_name: recommendation
    restart: unless-stopped
    ports:
      - "9001"
    environment:
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8013
      - RECOMMENDATION_PORT=9001
      - PRODUCT_CATALOG_ADDR=product-catalog:3550
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=recommendation
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      # AlwaysOn Profiling — Python, requires splunk-opentelemetry[all] package
      - SPLUNK_PROFILER_ENABLED=true
    depends_on:
      otel-collector:
        condition: service_started
      product-catalog:
        condition: service_started
    logging: *logging

  shipping:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-shipping
    container_name: shipping
    restart: unless-stopped
    ports:
      - "50050"
    environment:
      - SHIPPING_PORT=50050
      - QUOTE_ADDR=http://quote:8090
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=shipping
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  # ============================================================
  # REQUIRED DEPENDENCIES
  # ============================================================

  flagd:
    image: ghcr.io/open-feature/flagd:v0.12.1
    container_name: flagd
    restart: unless-stopped
    environment:
      - FLAGD_OTEL_COLLECTOR_URI=otel-collector:4317
      - FLAGD_METRICS_EXPORTER=otel
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=flagd
    command: ["start", "--uri", "file:./etc/flagd/demo.flagd.json"]
    ports:
      - "8013"
    volumes:
      - ./demo.flagd.json:/etc/flagd/demo.flagd.json:ro
    logging: *logging

  valkey-cart:
    image: valkey/valkey:8.1-alpine
    container_name: valkey-cart
    user: valkey
    restart: unless-stopped
    ports:
      - "6379"
    logging: *logging

  kafka:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-kafka
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      # KRaft mode requires explicit listener + quorum config (new in 2025 image)
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=cumulative
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=opentelemetry-demo,deployment.environment=${SPLUNK_ENVIRONMENT}
      - OTEL_SERVICE_NAME=kafka
      - KAFKA_HEAP_OPTS=-Xmx400m -Xms400m
    healthcheck:
      test: nc -z kafka 9092
      start_period: 10s
      interval: 5s
      timeout: 10s
      retries: 10
    logging: *logging

  # ============================================================
  # MINIMAL UI STUBS (required by frontend-proxy routing config)
  # These are lightweight — no OSS backend is needed since we
  # forward all telemetry to Splunk Observability Cloud.
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:1.66.0
    container_name: jaeger
    command:
      - "--memory.max-traces=500"
      - "--query.base-path=/jaeger/ui"
    restart: unless-stopped
    ports:
      - "16686"
    logging: *logging

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000"
    logging: *logging

  # ============================================================
  # SUPERVISOR UI
  # Bridges the O11y Agent assessment API into a web dashboard.
  # Open http://localhost:9090 — click "Agent" tab for findings.
  # ============================================================
  supervisor:
    build:
      context: ../../splunk-otel-supervisor
      dockerfile: Dockerfile
    container_name: supervisor
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      - O11Y_AGENT_URL=http://o11y-agent:4318
      - SPLUNK_REALM
      - SPLUNK_ACCESS_TOKEN
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
      - CLAUDE_MODEL=${BEDROCK_MODEL_ID}
      - SUPERVISOR_DATA_DIR=/app/data
    volumes:
      - supervisor-data:/app/data
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ../../splunk-otel-supervisor/static:/app/static:ro
      - ../../splunk-otel-supervisor/supervisor:/app/supervisor:ro
    depends_on:
      - o11y-agent
    logging: *logging

volumes:
  agent-state:
    driver: local
  supervisor-data:
    driver: local
