name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/docker-build.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/o11y-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout autonomous-o11y-agent
        uses: actions/checkout@v4
        with:
          path: autonomous-o11y-agent

      # Clone sibling repos required by the Dockerfile build context
      - name: Clone sibling tool repos
        run: |
          git clone --depth=1 https://github.com/mqbui1/auto-detector-provisioner.git
          git clone --depth=1 https://github.com/mqbui1/o11y-usage-governance.git
          git clone --depth=1 https://github.com/mqbui1/o11y-instrumentation-analyzer.git
          git clone --depth=1 https://github.com/mqbui1/splunk-o11y-health-check.git

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Build context is the parent directory so all sibling repos are available
          context: .
          file: autonomous-o11y-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
